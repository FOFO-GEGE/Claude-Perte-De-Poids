function getTheme(dark) {
  return dark ? {
    bg: "#0E0E0C", surface: "#161614", text: "#F4F2EC",
    muted: "rgba(244,242,236,0.55)", fainter: "rgba(244,242,236,0.32)",
    hairline: "rgba(244,242,236,0.10)", chipBg: "rgba(244,242,236,0.06)",
  } : {
    bg: "#FAF9F5", surface: "#FFFFFF", text: "#161514",
    muted: "rgba(22,21,20,0.52)", fainter: "rgba(22,21,20,0.30)",
    hairline: "rgba(22,21,20,0.10)", chipBg: "rgba(22,21,20,0.04)",
  };
}
function calcBMR(p) {
  const b = 10 * p.weight + 6.25 * p.height - 5 * p.age;
  return p.sex === "homme" ? b + 5 : b - 161;
}
function calcTDEE(p) { return Math.round(calcBMR(p) * p.activity); }
function calcBudget(p) { return Math.max(1200, calcTDEE(p) - 500); }

function fmt(date) {
  return date.toISOString().slice(0, 10);
}
function addDays(date, n) {
  const d = new Date(date); d.setDate(d.getDate() + n); return d;
}

// ── Tween ─────────────────────────────────────────────────────────────────
function useTween(value, ms = 600) {
  const [v, setV] = useState(value);
  const from = useRef(value);
  useEffect(() => {
    const start = performance.now();
    const a = from.current, b = value;
    let raf;
    const tick = now => {
      const t = Math.min(1, (now - start) / ms);
      setV(a + (b - a) * (1 - Math.pow(1 - t, 3)));
      if (t < 1) raf = requestAnimationFrame(tick); else from.current = b;
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [value, ms]);
  return v;
}

// ── Calendrier horizontal ─────────────────────────────────────────────────
function DayStrip({ selectedDay, setSelectedDay, mealsByDay, theme, accent }) {
  // Plage large : 180 jours passés + 180 jours futurs (~1 an)
  const RANGE = 180;
  const days = Array.from({ length: RANGE * 2 + 1 }, (_, i) => addDays(new Date(), i - RANGE));
  const scrollRef = useRef(null);
  const [visibleMonth, setVisibleMonth] = useState("");

  const DAY_FR = ["D", "L", "M", "M", "J", "V", "S"];
  const MONTH_FR = ["jan", "fév", "mar", "avr", "mai", "juin", "juil", "aoû", "sep", "oct", "nov", "déc"];
  const MONTH_FULL = ["janvier", "février", "mars", "avril", "mai", "juin", "juillet", "août", "septembre", "octobre", "novembre", "décembre"];

  // Centre la vue sur le jour sélectionné quand il change (manuel ou bouton "aujourd'hui")
  useEffect(() => {
    if (!scrollRef.current) return;
    const el = scrollRef.current.querySelector(`[data-key='${selectedDay}']`);
    if (el) el.scrollIntoView({ inline: "center", behavior: "smooth", block: "nearest" });
  }, [selectedDay]);

  // Met à jour le mois affiché en fonction du scroll
  const updateVisibleMonth = () => {
    if (!scrollRef.current) return;
    const el = scrollRef.current;
    const center = el.scrollLeft + el.clientWidth / 2;
    const child = el.children[Math.floor(center / 50)];
    if (child) {
      const key = child.getAttribute("data-key");
      if (key) {
        const d = new Date(key + "T12:00:00");
        setVisibleMonth(`${MONTH_FULL[d.getMonth()]} ${d.getFullYear()}`);
      }
    }
  };

  useEffect(() => { updateVisibleMonth(); }, [selectedDay]);

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "0 24px 8px" }}>
        <div style={{ fontSize: 10.5, letterSpacing: "0.14em", textTransform: "uppercase", color: theme.fainter }}>
          {visibleMonth || "Calendrier"}
        </div>
        {selectedDay !== TODAY && (
          <button
            onClick={() => setSelectedDay(TODAY)}
            style={{
              background: "transparent", border: `1px solid ${theme.hairline}`,
              color: theme.muted, fontSize: 10, padding: "4px 10px", borderRadius: 999,
              cursor: "pointer", fontFamily: "inherit", letterSpacing: "0.08em", textTransform: "uppercase",
            }}>Aujourd'hui</button>
        )}
      </div>
      <div ref={scrollRef} onScroll={updateVisibleMonth} style={{ display: "flex", overflowX: "auto", gap: 6, padding: "0 18px 2px", scrollbarWidth: "none" }}>
        {days.map(d => {
          const key = fmt(d);
          const isSelected = key === selectedDay;
          const isToday = key === TODAY;
          const hasMeals = (mealsByDay[key] || []).length > 0;
          return (
            <button
              key={key}
              data-key={key}
              data-selected={isSelected}
              onClick={() => setSelectedDay(key)}
              style={{
                flexShrink: 0, width: 44, display: "flex", flexDirection: "column", alignItems: "center",
                gap: 4, padding: "10px 0 8px", borderRadius: 14, border: "none",
                background: isSelected ? accent : "transparent",

// ── Courbe ────────────────────────────────────────────────────────────────
function ProjectionCurve({ history, todayWeight, goalWeight, daysToGoal, caloriePressure, style, accent, text, muted, hairline, pulseKey, height = 180 }) {
  const width = 360;
  const xMin = history.length ? history[0].day : -14;
  const xMax = Math.max(8, Math.min(120, daysToGoal + 8));
  const wMax = Math.max(todayWeight, ...history.map(h => h.w)) + 0.6;
  const wMin = Math.min(goalWeight, ...history.map(h => h.w)) - 0.6;
  const padL = 18, padR = 28, padT = 20, padB = 24;
  const iW = width - padL - padR, iH = height - padT - padB;
  const x = d => padL + ((d - xMin) / (xMax - xMin)) * iW;
  const y = w => padT + ((wMax - w) / (wMax - wMin)) * iH;
  const past = [...history, { day: 0, w: todayWeight }].sort((a, b) => a.day - b.day);
  const smooth = pts => {
    if (pts.length < 2) return "";
    let d = `M ${pts[0].x} ${pts[0].y}`;
    for (let i = 0; i < pts.length - 1; i++) {
      const p0 = pts[i-1]||pts[i], p1 = pts[i], p2 = pts[i+1], p3 = pts[i+2]||pts[i+1];
      d += ` C ${p1.x+(p2.x-p0.x)/6} ${p1.y+(p2.y-p0.y)/6},${p2.x-(p3.x-p1.x)/6} ${p2.y-(p3.y-p1.y)/6},${p2.x} ${p2.y}`;
    }
    return d;
  };
  const pastPts = past.map(p => ({ x: x(p.day), y: y(p.w) }));
  const pastD = smooth(pastPts);
  const eX = x(Math.min(daysToGoal, xMax)), eY = y(goalWeight);
  const sX = x(0), sY = y(todayWeight);
  const bend = caloriePressure * Math.min(36, (eX - sX) * 0.18);
  const futureD = `M ${sX} ${sY} Q ${(sX+eX)/2} ${(sY+eY)/2+bend} ${eX} ${eY}`;
  const areaD = pastD ? `${pastD} L ${pastPts[pastPts.length-1].x} ${padT+iH} L ${pastPts[0].x} ${padT+iH} Z` : "";
  const goalY = y(goalWeight);
  return (
    <svg viewBox={`0 0 ${width} ${height}`} width="100%" style={{ display: "block", overflow: "visible" }}>
      <line x1={padL} x2={width-padR} y1={goalY} y2={goalY} stroke={hairline} strokeDasharray="2 4" strokeWidth="1" />
      <text x={width-padR+4} y={goalY+3} fontSize="10" fill={muted} fontFamily="ui-sans-serif">{goalWeight.toFixed(1)}</text>
      {style === "area" && <path d={areaD} fill={accent} fillOpacity="0.07" />}
      <path d={pastD} fill="none" stroke={text} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round" />
      {pastPts.slice(0,-1).filter((_,i)=>i%2===0).map((p,i)=>(
        <circle key={i} cx={p.x} cy={p.y} r="1.4" fill={text} fillOpacity="0.5" />
      ))}
      <path d={futureD} fill="none" stroke={accent} strokeWidth={style==="dotted"?1.2:1.4} strokeLinecap="round" strokeDasharray={style==="dotted"?"1 5":"4 5"} />
      <circle cx={eX} cy={eY} r="3.2" fill="none" stroke={accent} strokeWidth="1.4" />
      <circle cx={eX} cy={eY} r="1.1" fill={accent} />
      <g key={pulseKey}>
        <circle cx={sX} cy={sY} r="3.6" fill={text} />
        <circle cx={sX} cy={sY} r="3.6" fill="none" stroke={text} strokeWidth="1.2" opacity="0.55">
          <animate attributeName="r" from="3.6" to="22" dur="1.4s" begin="0s" fill="freeze" />
          <animate attributeName="opacity" from="0.55" to="0" dur="1.4s" begin="0s" fill="freeze" />
        </circle>
      </g>
      <text x={sX} y={height-4} fontSize="9" fill={muted} fontFamily="ui-sans-serif" textAnchor="middle" style={{letterSpacing:"0.1em",textTransform:"uppercase"}}>AUJ</text>
      <text x={eX} y={height-4} fontSize="9" fill={muted} fontFamily="ui-sans-serif" textAnchor="middle" style={{letterSpacing:"0.1em",textTransform:"uppercase"}}>{daysToGoal}J</text>
    </svg>
  );
}

function useIsMobile() {
  const [mobile, setMobile] = useState(() => window.innerWidth < 700);
  useEffect(() => {
    const fn = () => setMobile(window.innerWidth < 700);
    window.addEventListener("resize", fn);
    return () => window.removeEventListener("resize", fn);
  }, []);
  return mobile;
}

function normaliseQuery(s) {
  // Supprime les accents et met en minuscules → "café" = "cafe", "Île" = "ile"
  return s.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

async function searchFood(query) {
  const q = normaliseQuery(query);
  const url = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q)}&search_simple=1&json=1&page_size=10&fields=product_name,brands,nutriments`;
  const res = await fetch(url, { signal: AbortSignal.timeout(5000) });
  const data = await res.json();
  return (data.products || [])
    .filter(p => p.product_name)
    .map(p => ({
      name: p.product_name,
      brand: p.brands ? p.brands.split(",")[0].trim() : "",
      kcal: p.nutriments?.["energy-kcal_100g"] ?? null,
    }))
    .filter(p => p.kcal != null && p.kcal > 0)
    .slice(0, 10);
}

function AddMealSheet({ open, onClose, onSubmit, theme, accent, isMobile }) {
  const [query, setQuery] = useState("");
  const [grams, setGrams] = useState(100);
  const [customGrams, setCustomGrams] = useState("");
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [selected, setSelected] = useState(null);
  const [editName, setEditName] = useState("");

  const activeGrams = customGrams !== "" ? (parseInt(customGrams) || 0) : grams;

  useEffect(() => {
    if (!open) {
      setQuery(""); setGrams(100); setCustomGrams(""); setResults([]);
      setLoading(false); setSelected(null); setEditName("");
    }
  }, [open]);

  useEffect(() => {
    setSelected(null); setEditName("");
    if (!query.trim()) { setResults([]); return; }
    setLoading(true);
    const t = setTimeout(async () => {
      try {
        const r = await searchFood(query);
        setResults(r);
      } catch { setResults([]); }
      finally { setLoading(false); }
    }, 250);
    return () => clearTimeout(t);
  }, [query]);

  const handleSelect = (item) => {
    setSelected(item);
    setEditName(item.brand ? `${item.name} · ${item.brand}` : item.name);
  };

  const handleAdd = () => {
    if (!selected) return;
    const kcal = Math.round(selected.kcal * activeGrams / 100);
    onSubmit(`${editName} (${activeGrams}g)`, kcal);
  };

  if (!open) return null;
  return (
    <div style={{ position: isMobile ? "fixed" : "absolute", inset: 0, zIndex: 50, display: "flex", flexDirection: "column", justifyContent: "flex-end" }}>
      <div onClick={onClose} style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.18)", animation: "fadeIn 240ms ease" }} />
      <div style={{ position: "relative", background: theme.surface, borderTopLeftRadius: 28, borderTopRightRadius: 28, padding: "14px 22px 24px", animation: "sheetIn 320ms cubic-bezier(.2,.7,.2,1)", boxShadow: "0 -8px 40px rgba(0,0,0,0.16)", maxHeight: "78%", display: "flex", flexDirection: "column" }}>
        <div style={{ width: 38, height: 4, borderRadius: 2, background: theme.hairline, margin: "0 auto 14px", flexShrink: 0 }} />

        {/* Search */}
        <div style={{ position: "relative", marginBottom: 10, flexShrink: 0 }}>
          <input autoFocus value={query} onChange={e => setQuery(e.target.value)}
            placeholder="Nutella, yaourt nature, saumon…"
            style={{ width: "100%", height: 44, borderRadius: 12, border: `1px solid ${loading ? accent : theme.hairline}`, background: theme.chipBg, color: theme.text, fontSize: 15, padding: "0 44px 0 14px", fontFamily: "inherit", outline: "none", boxSizing: "border-box", transition: "border-color 200ms" }}
          />
          <div style={{ position: "absolute", right: 14, top: "50%", transform: "translateY(-50%)" }}>
            {loading ? <Spinner accent={accent} /> : query.trim() ? (
              <button onClick={() => setQuery("")} style={{ background: "none", border: "none", color: theme.fainter, cursor: "pointer", fontSize: 18, lineHeight: 1, padding: 0 }}>×</button>
            ) : null}
          </div>
        </div>

        {/* Quantity */}
        <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 12, flexShrink: 0, flexWrap: "wrap" }}>
          <span style={{ fontSize: 11, color: theme.muted, textTransform: "uppercase", letterSpacing: "0.12em", marginRight: 2 }}>Quantité</span>
          {[50, 100, 150, 200, 250].map(g => (
            <button key={g} onClick={() => { setGrams(g); setCustomGrams(""); }} style={{ background: grams === g && customGrams === "" ? accent : theme.chipBg, color: grams === g && customGrams === "" ? "#fff" : theme.text, border: `1px solid ${grams === g && customGrams === "" ? accent : theme.hairline}`, padding: "5px 9px", borderRadius: 999, fontSize: 11, fontFamily: "inherit", cursor: "pointer" }}>{g}g</button>
          ))}
          <input type="number" value={customGrams} onChange={e => setCustomGrams(e.target.value)} placeholder="autre"
            style={{ width: 60, height: 28, borderRadius: 999, border: `1px solid ${customGrams ? accent : theme.hairline}`, background: customGrams ? accent + "18" : theme.chipBg, color: theme.text, fontSize: 11, padding: "0 8px", fontFamily: "inherit", outline: "none", textAlign: "center" }} />
          {customGrams && <span style={{ fontSize: 11, color: theme.fainter }}>g</span>}
        </div>

        {/* Selected item edit */}
        {selected && (
          <div style={{ background: theme.chipBg, border: `1px solid ${accent}44`, borderRadius: 14, padding: "12px 14px", marginBottom: 10, flexShrink: 0 }}>
            <div style={{ fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase", color: theme.fainter, marginBottom: 6 }}>Modifier avant d'ajouter</div>
            <input value={editName} onChange={e => setEditName(e.target.value)}
              style={{ width: "100%", background: "transparent", border: "none", outline: "none", color: theme.text, fontSize: 14, fontFamily: "inherit", marginBottom: 8 }} />
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: 13, color: theme.muted }}>
                {selected.kcal.toFixed(0)} kcal/100g →{" "}
                <span style={{ color: accent, fontWeight: 500 }}>{Math.round(selected.kcal * activeGrams / 100)} kcal</span>
              </span>
              <button onClick={handleAdd} style={{ height: 36, padding: "0 18px", borderRadius: 18, border: "none", background: accent, color: "#fff", fontFamily: "inherit", fontSize: 13, fontWeight: 500, cursor: "pointer" }}>
                Ajouter
              </button>
            </div>
          </div>
        )}

        {/* Results */}
        <div style={{ flex: 1, overflowY: "auto" }}>
          {!query.trim() ? (
            <div style={{ fontSize: 12, color: theme.fainter, padding: "8px 0" }}>Tapez un aliment ou une marque — accents optionnels</div>
          ) : !loading && results.length === 0 ? (
            <div style={{ fontSize: 13, color: theme.fainter, fontStyle: "italic", padding: "12px 0" }}>Aucun résultat</div>
          ) : results.map((item, i) => {
            const computed = Math.round(item.kcal * activeGrams / 100);
            const isSel = selected === item;
            return (
              <button key={i} onClick={() => handleSelect(item)} style={{ width: "100%", display: "flex", justifyContent: "space-between", alignItems: "center", padding: "11px 10px", borderRadius: 10, marginBottom: 2, borderTop: "none", background: isSel ? accent + "18" : "transparent", border: isSel ? `1px solid ${accent}44` : "1px solid transparent", cursor: "pointer", textAlign: "left", fontFamily: "inherit" }}>
                <div style={{ flex: 1, marginRight: 12 }}>
                  <div style={{ fontSize: 14, color: theme.text, lineHeight: 1.3 }}>{item.name}</div>
                  {item.brand && <div style={{ fontSize: 11, color: theme.fainter, marginTop: 2 }}>{item.brand}</div>}
                </div>
                <span style={{ fontSize: 13, color: accent, fontVariantNumeric: "tabular-nums", flexShrink: 0, fontWeight: 500 }}>
                  {computed} kcal
                </span>
              </button>
            );
          })}
        </div>

        <button onClick={onClose} style={{ marginTop: 12, height: 42, borderRadius: 21, border: `1px solid ${theme.hairline}`, background: "transparent", color: theme.muted, fontFamily: "inherit", fontSize: 14, cursor: "pointer", flexShrink: 0 }}>Annuler</button>
      </div>
    </div>
  );
}

// ── Page Métabolisme ──────────────────────────────────────────────────────
function MetabolismPage({ profile, setProfile, theme, accent }) {
  const bmr = Math.round(calcBMR(profile));
  const tdee = calcTDEE(profile);
  const budget = calcBudget(profile);
  const deficit = tdee - budget;
  const set = (k, v) => setProfile(p => ({ ...p, [k]: v }));

  // État local pour la saisie brute (permet de taper librement)
  const [raw, setRaw] = useState({
    age: String(profile.age), height: String(profile.height),
    weight: String(profile.weight), goalWeight: String(profile.goalWeight),
  });

  // Sync si le profil change depuis l'extérieur
  useEffect(() => {
    setRaw({ age: String(profile.age), height: String(profile.height), weight: String(profile.weight), goalWeight: String(profile.goalWeight) });
  }, [profile.age, profile.height, profile.weight, profile.goalWeight]);

  const CLAMP = { age: [10, 120], height: [100, 250], weight: [30, 300], goalWeight: [30, 300] };
  const onBlur = (k, step) => {
    const parsed = step ? parseFloat(raw[k]) : parseInt(raw[k], 10);
    const [mn, mx] = CLAMP[k];
    const clamped = isNaN(parsed) ? profile[k] : Math.min(mx, Math.max(mn, parsed));
    set(k, clamped);
    setRaw(r => ({ ...r, [k]: String(clamped) }));
  };

  const lbl = { fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase", color: theme.muted, marginBottom: 6, display: "block" };
  const inp = { width: "100%", height: 44, borderRadius: 12, border: `1px solid ${theme.hairline}`, background: theme.chipBg, color: theme.text, fontSize: 15, padding: "0 14px", fontFamily: "inherit", outline: "none", boxSizing: "border-box" };
  return (
    <div style={{ padding: "28px 28px 120px", overflowY: "auto" }}>
      <div style={{ fontSize: 11, letterSpacing: "0.16em", textTransform: "uppercase", color: theme.muted, marginBottom: 8 }}>Mon profil</div>
      <div style={{ fontFamily: '"Instrument Serif", Georgia, serif', fontStyle: "italic", fontSize: 32, lineHeight: 1.1, marginBottom: 28 }}>Métabolisme</div>
      <div style={{ marginBottom: 18 }}>
        <span style={lbl}>Sexe</span>
        <div style={{ display: "flex", gap: 8 }}>
          {["homme", "femme"].map(s => (
            <button key={s} onClick={() => set("sex", s)} style={{ flex: 1, height: 42, borderRadius: 12, border: `1px solid ${profile.sex === s ? accent : theme.hairline}`, background: profile.sex === s ? accent : "transparent", color: profile.sex === s ? "#fff" : theme.text, fontSize: 14, fontFamily: "inherit", cursor: "pointer", fontWeight: 500, transition: "all 200ms" }}>
              {s === "homme" ? "Homme" : "Femme"}
            </button>
          ))}
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 18 }}>
        <div><span style={lbl}>Âge</span><input type="number" value={raw.age} onChange={e => setRaw(r => ({ ...r, age: e.target.value }))} onBlur={() => onBlur("age")} style={inp} /></div>
        <div><span style={lbl}>Taille (cm)</span><input type="number" value={raw.height} onChange={e => setRaw(r => ({ ...r, height: e.target.value }))} onBlur={() => onBlur("height")} style={inp} /></div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 18 }}>
        <div><span style={lbl}>Poids actuel (kg)</span><input type="number" step="0.1" value={raw.weight} onChange={e => setRaw(r => ({ ...r, weight: e.target.value }))} onBlur={() => onBlur("weight", true)} style={inp} /></div>
        <div><span style={lbl}>Objectif (kg)</span><input type="number" step="0.1" value={raw.goalWeight} onChange={e => setRaw(r => ({ ...r, goalWeight: e.target.value }))} onBlur={() => onBlur("goalWeight", true)} style={inp} /></div>
      </div>
      <div style={{ marginBottom: 24 }}>
        <span style={lbl}>Niveau d'activité</span>
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {ACTIVITY_LEVELS.map(a => (
            <button key={a.value} onClick={() => set("activity", a.value)} style={{ height: 42, borderRadius: 12, border: `1px solid ${profile.activity === a.value ? accent : theme.hairline}`, background: profile.activity === a.value ? accent : "transparent", color: profile.activity === a.value ? "#fff" : theme.text, fontSize: 13, fontFamily: "inherit", cursor: "pointer", fontWeight: 500, padding: "0 16px", textAlign: "left", transition: "all 200ms" }}>
              {a.label}
            </button>
          ))}
        </div>
      </div>
      <div>
        <span style={lbl}>Résultats</span>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
          {[
            { label: "MB", value: bmr, sub: "métabolisme basal" },
            { label: "TDEE", value: tdee, sub: "dépense totale" },
            { label: "Budget", value: budget, sub: `déficit ${deficit} kcal` },
          ].map(c => (
            <div key={c.label} style={{ background: theme.chipBg, border: `1px solid ${theme.hairline}`, borderRadius: 14, padding: "14px 10px", textAlign: "center" }}>
              <div style={{ fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase", color: theme.fainter, marginBottom: 4 }}>{c.label}</div>
              <div style={{ fontFamily: '"Instrument Serif", Georgia, serif', fontStyle: "italic", fontSize: 22, color: theme.text, lineHeight: 1 }}>{c.value.toLocaleString("fr-FR")}</div>
              <div style={{ fontSize: 9.5, color: theme.muted, marginTop: 4, lineHeight: 1.3 }}>{c.sub}</div>
            </div>
          ))}
        </div>
        <div style={{ fontSize: 11, color: theme.fainter, marginTop: 12, lineHeight: 1.6 }}>
          Mifflin-St Jeor · −{deficit} kcal/j ≈ {(deficit * 7 / 7700).toFixed(2)} kg/sem
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────
function App() {
  function loadStorage() {
    try {
      return {
        accent: localStorage.getItem("wl-accent") || "#1F8A5B",
        dark: localStorage.getItem("wl-dark") === "true",
        profile: JSON.parse(localStorage.getItem("wl-profile")) || DEFAULT_PROFILE,
        mealsByDay: JSON.parse(localStorage.getItem("wl-meals")) || { [TODAY]: seedMealsForDay(TODAY) },
      };
    } catch { return { accent: "#1F8A5B", dark: false, profile: DEFAULT_PROFILE, mealsByDay: { [TODAY]: seedMealsForDay(TODAY) } }; }
  }
  const init = loadStorage();
  const [accent, setAccent] = useState(init.accent);
  const [dark, setDark] = useState(init.dark);
  const [curveStyle, setCurveStyle] = useState("line");
  const [page, setPage] = useState("track");
  const [profile, setProfile] = useState(init.profile);
  const [selectedDay, setSelectedDay] = useState(TODAY);
  const [mealsByDay, setMealsByDay] = useState(init.mealsByDay);
  const [sheetOpen, setSheetOpen] = useState(false);
  const [pulseKey, setPulseKey] = useState(0);
  const theme = getTheme(dark);

  useEffect(() => { localStorage.setItem("wl-accent", accent); }, [accent]);
  useEffect(() => { localStorage.setItem("wl-dark", dark); }, [dark]);
  useEffect(() => { localStorage.setItem("wl-profile", JSON.stringify(profile)); }, [profile]);
  useEffect(() => { localStorage.setItem("wl-meals", JSON.stringify(mealsByDay)); }, [mealsByDay]);


  const meals = mealsByDay[selectedDay] || [];
  const isToday = selectedDay === TODAY;
  const budget = calcBudget(profile);
  const tdee = calcTDEE(profile);
  const eaten = meals.reduce((s, m) => s + (m.kcal || 0), 0);
  const remaining = budget - eaten;

  // Historique réel : tous les jours passés loggés, triés
  const todayDate = new Date(TODAY + "T12:00:00");
  const pastLoggedDays = Object.entries(mealsByDay)
    .filter(([d, ms]) => d <= TODAY && ms.length > 0)
    .map(([d, ms]) => ({ dateKey: d, kcal: ms.reduce((s, m) => s + (m.kcal || 0), 0) }))
    .sort((a, b) => a.dateKey.localeCompare(b.dateKey));

  // Moyenne calories sur les jours loggés (pour la projection)
  const avgEaten = pastLoggedDays.length > 0
    ? pastLoggedDays.reduce((s, d) => s + d.kcal, 0) / pastLoggedDays.length
    : eaten;

  // Trajectoire basée sur la moyenne historique
  const ratio = eaten / budget; // pour la barre du jour sélectionné
  const avgRatio = avgEaten / budget;
  const pressure = Math.max(-1, Math.min(1, (avgRatio - 0.7) * 1.8));
  const daysToGoal = Math.round(18 + avgRatio * 50);
  const weeklyDelta = -(3.5 - avgRatio * 3.8);

  // Construire l'historique de poids depuis les données réelles
  // On part du poids actuel et on remonte en sens inverse via le bilan calorique
  const historySeed = (() => {
    if (pastLoggedDays.length === 0) {
      // Pas d'historique : courbe fictive plausible
      return Array.from({ length: 5 }, (_, i) => ({
        day: -(10 - i * 2),
        w: profile.weight + (1.5 - i * 0.3),
      }));
    }
    // Pour chaque jour loggé, calculer le delta de poids (kcal surplus / 7700)
    // et reconstruire la courbe depuis le poids d'aujourd'hui en remontant
    const points = [];
    let w = profile.weight;
    // Parcourir du plus récent au plus ancien
    const reversed = [...pastLoggedDays].reverse();
    for (const entry of reversed) {
      const dayDiff = Math.round((todayDate - new Date(entry.dateKey + "T12:00:00")) / 86400000);
      const surplus = entry.kcal - tdee;
      w = w - surplus / 7700; // remonter dans le temps = inverser le delta
      points.unshift({ day: -dayDiff, w: Math.round(w * 10) / 10 });
    }
    return points;
  })();

  const tweenedEaten = useTween(eaten);
  const tweenedDays = useTween(daysToGoal);
  const tweenedDelta = useTween(weeklyDelta);

  const onLogMeal = (name, kcal) => {
    const time = new Date().toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
    setMealsByDay(prev => ({
      ...prev,
      [selectedDay]: [...(prev[selectedDay] || []), { id: Date.now(), time, name, kcal }],
    }));
    setSheetOpen(false); setPulseKey(k => k + 1);
  };
  const onDeleteMeal = id => {
    setMealsByDay(prev => ({
      ...prev,
      [selectedDay]: (prev[selectedDay] || []).filter(x => x.id !== id),
    }));
    setPulseKey(k => k + 1);
  };

  const MONTH_FR = ["jan", "fév", "mar", "avr", "mai", "juin", "juil", "aoû", "sep", "oct", "nov", "déc"];
  const DAY_FULL_FR = ["dimanche", "lundi", "mardi", "mercredi", "jeudi", "vendredi", "samedi"];
  const selDate = new Date(selectedDay + "T12:00:00");
  const dayLabel = isToday ? "Aujourd'hui" : selDate.getDate() + " " + MONTH_FR[selDate.getMonth()];

  return (
    <div style={{ minHeight: "100vh", width: "100%", display: "flex", alignItems: "center", justifyContent: "center", background: dark ? "#1a1a18" : "#EFEDE6", fontFamily: '"Inter Tight", ui-sans-serif, system-ui, sans-serif', padding: 20, boxSizing: "border-box" }}>
      <style>{`
        @keyframes mealIn { from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)} }
        @keyframes sheetIn { from{transform:translateY(100%)}to{transform:translateY(0)} }
        @keyframes fadeIn { from{opacity:0}to{opacity:1} }
        @keyframes dotPulse { 0%,80%,100%{transform:scale(0.5);opacity:0.3} 40%{transform:scale(1);opacity:1} }
        .meal-del:hover { background:rgba(180,40,40,0.10)!important; color:#B62828!important; }
        ::-webkit-scrollbar { display: none; }
      `}</style>

      <div style={{ width: "100%", maxWidth: 420, height: 820, maxHeight: "92vh", borderRadius: 32, overflow: "hidden", position: "relative", background: theme.bg, color: theme.text, boxShadow: "0 30px 60px rgba(0,0,0,0.18),0 0 0 1px rgba(0,0,0,0.08)", letterSpacing: "-0.01em", display: "flex", flexDirection: "column" }}>

        <div style={{ flex: 1, overflowY: "auto", overflowX: "hidden" }}>
          {page === "track" ? (
            <>
              {/* Header */}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "24px 28px 0" }}>
                <div>
                  <div style={{ fontSize: 11, letterSpacing: "0.16em", textTransform: "uppercase", color: theme.muted }}>{DAY_FULL_FR[selDate.getDay()]}</div>
                  <div style={{ fontFamily: '"Instrument Serif", Georgia, serif', fontStyle: "italic", fontSize: 28, lineHeight: 1.1, marginTop: 2 }}>{dayLabel}</div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: 11, color: theme.fainter }}>{budget.toLocaleString("fr-FR")} kcal/j</div>
                  <div style={{ display: "flex", gap: 5, marginTop: 6, justifyContent: "flex-end" }}>
                    {ACCENTS.map(c => <button key={c} onClick={() => setAccent(c)} style={{ width: 16, height: 16, borderRadius: "50%", background: c, border: accent === c ? `2px solid ${theme.text}` : `1px solid ${theme.hairline}`, cursor: "pointer", padding: 0 }} />)}
                    <button onClick={() => setDark(!dark)} style={{ width: 16, height: 16, borderRadius: "50%", background: theme.chipBg, border: `1px solid ${theme.hairline}`, cursor: "pointer", padding: 0, fontSize: 9, color: theme.text, display: "flex", alignItems: "center", justifyContent: "center" }}>{dark ? "☾" : "☀"}</button>
                  </div>
                </div>
              </div>

              {/* Poids hero */}
              <div style={{ padding: "16px 28px 0", display: "flex", alignItems: "baseline", gap: 10 }}>
                <div style={{ fontFamily: '"Instrument Serif", Georgia, serif', fontSize: 72, lineHeight: 0.95, fontWeight: 400, letterSpacing: "-0.03em", fontStyle: "italic" }}>{profile.weight.toFixed(1)}</div>
                <div style={{ fontSize: 13, color: theme.muted }}>kg</div>
                <div style={{ marginLeft: 4, fontSize: 13, color: tweenedDelta <= 0 ? accent : "#B65538", fontWeight: 500 }}>{tweenedDelta > 0 ? "+" : ""}{tweenedDelta.toFixed(1)} kg/sem</div>
              </div>
              <div style={{ padding: "4px 28px 0", fontSize: 12, color: theme.fainter }}>obj. {profile.goalWeight.toFixed(1)} kg · ~{Math.round(tweenedDays)} jours</div>

              {/* Courbe */}
              <div style={{ padding: "12px 18px 0" }}>
                <div style={{ display: "flex", justifyContent: "space-between", padding: "0 10px 4px", fontSize: 10, letterSpacing: "0.14em", textTransform: "uppercase", color: theme.fainter }}>
                  <span>Trajectoire</span>
                  <select value={curveStyle} onChange={e => setCurveStyle(e.target.value)} style={{ background: "transparent", border: "none", color: theme.fainter, fontFamily: "inherit", fontSize: 10, cursor: "pointer", outline: "none", letterSpacing: "0.1em", textTransform: "uppercase" }}>
                    <option value="line">Trait</option><option value="area">Aire</option><option value="dotted">Pointillé</option>
                  </select>
                </div>
                <ProjectionCurve history={historySeed} todayWeight={profile.weight} goalWeight={profile.goalWeight} daysToGoal={daysToGoal} caloriePressure={pressure} style={curveStyle} accent={accent} text={theme.text} muted={theme.muted} hairline={theme.hairline} pulseKey={pulseKey} />
              </div>

              {/* Calendrier */}
              <div style={{ padding: "14px 0 4px" }}>
                <DayStrip selectedDay={selectedDay} setSelectedDay={setSelectedDay} mealsByDay={mealsByDay} theme={theme} accent={accent} />
              </div>

              {/* Barre calories */}
              <div style={{ padding: "14px 28px 0" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>
                  <div style={{ fontSize: 11, letterSpacing: "0.16em", textTransform: "uppercase", color: theme.muted }}>Calories</div>
                  <div style={{ fontSize: 13, color: theme.muted }}>
                    <span style={{ fontFamily: '"Instrument Serif", Georgia, serif', fontStyle: "italic", fontSize: 16, color: theme.text }}>{Math.round(tweenedEaten).toLocaleString("fr-FR")}</span>
                    <span style={{ margin: "0 4px", color: theme.fainter }}>/</span>
                    <span>{budget.toLocaleString("fr-FR")} kcal</span>
                  </div>
                </div>
                <div style={{ position: "relative", height: 2, background: theme.hairline, borderRadius: 1 }}>
                  <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: `${Math.min(100, (eaten/budget)*100)}%`, background: accent, transition: "width 700ms cubic-bezier(.4,0,.2,1)", borderRadius: 1 }} />
                </div>
                <div style={{ marginTop: 6, fontSize: 12, color: theme.muted }}>
                  {remaining >= 0
                    ? <>il reste <span style={{ color: theme.text }}>{remaining.toLocaleString("fr-FR")}</span> kcal</>
                    : <span style={{ color: accent }}>{Math.abs(remaining).toLocaleString("fr-FR")} kcal au-dessus</span>}
                </div>
              </div>

              {/* Liste repas */}
              <div style={{ padding: "20px 28px 140px" }}>
                <div style={{ fontSize: 11, letterSpacing: "0.16em", textTransform: "uppercase", color: theme.muted, marginBottom: 12 }}>Repas</div>
                {meals.length === 0 ? (
                  <div style={{ fontSize: 14, color: theme.fainter, fontStyle: "italic", padding: "8px 0" }}>
                    Aucun repas enregistré{isToday ? " aujourd'hui" : " ce jour"}.
                  </div>
                ) : meals.map((m, i) => (
                  <div key={m.id} className="meal-row" style={{ display: "grid", gridTemplateColumns: "44px 1fr auto 28px", alignItems: "baseline", gap: 12, padding: "12px 0", borderTop: i === 0 ? "none" : `1px solid ${theme.hairline}`, animation: i === meals.length-1 && m.id > 1000 ? "mealIn 600ms ease" : "none" }}>
                    <div style={{ fontSize: 11, color: theme.fainter, fontVariantNumeric: "tabular-nums" }}>{m.time}</div>
                    <div style={{ fontSize: 14, color: theme.text }}>{m.name}</div>
                    <div style={{ fontSize: 13, color: theme.muted, fontVariantNumeric: "tabular-nums" }}>{m.kcal != null ? m.kcal : "—"} <span style={{ color: theme.fainter, fontSize: 11 }}>kcal</span></div>
                    <button onClick={() => onDeleteMeal(m.id)} className="meal-del" style={{ width: 24, height: 24, borderRadius: "50%", border: "none", background: "transparent", color: theme.fainter, cursor: "pointer", padding: 0, fontSize: 16, lineHeight: 1, alignSelf: "center", transition: "all 150ms" }}>×</button>
                  </div>
                ))}
              </div>

              {/* CTA - sticky bottom of scroll area */}
              <div style={{ position: "sticky", bottom: 0, left: 0, right: 0, padding: "12px 20px 16px", background: `linear-gradient(to top, ${theme.bg} 65%, transparent)`, zIndex: 10, marginTop: -60 }}>
                <button onClick={() => setSheetOpen(true)} style={{ width: "100%", height: 54, borderRadius: 27, border: "none", background: theme.text, color: theme.bg, fontSize: 15, fontFamily: "inherit", fontWeight: 500, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, boxShadow: dark ? "0 8px 24px rgba(0,0,0,0.6)" : "0 8px 24px rgba(22,21,20,0.18)" }}>
                  <span style={{ fontSize: 20, fontWeight: 300, marginTop: -2 }}>+</span>
                  Ajouter un repas · {dayLabel}
                </button>
              </div>

              <AddMealSheet open={sheetOpen} onClose={() => setSheetOpen(false)} onSubmit={onLogMeal} theme={theme} accent={accent} isMobile={isMobile} />
            </>
          ) : (
            <MetabolismPage profile={profile} setProfile={setProfile} theme={theme} accent={accent} />
          )}
        </div>

        <TabBar page={page} setPage={setPage} theme={theme} accent={accent} />
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
